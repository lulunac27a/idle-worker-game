<html>
    <head>
        <title>Idle Worker Game</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Idle Worker Game</h1>
        <div id="level">Level: <span id="levelText">0</span></div>
        <br />
        <progress id="xpBar" max="100" value="0"></progress><br />
        <div id="xp">
            XP: <span id="xpText">0</span> / <span id="xpRequired">100</span>
        </div>
        <br />
        <div id="gold">Gold: <span id="goldAmount">0</span></div>
        <br />
        <!--button to buy worker--><button id="buyWorker">
            Buy Worker (Cost: <span id="workerCost">100</span> Gold)</button
        ><br />
        <!--button to earn gold--><button id="earnGold">Earn Gold</button>
        <!--list of workers-->
        <div id="workers"></div>
        <script src="main.js"></script>
    </body>
</html>
